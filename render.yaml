services:
  # Backend - FastAPI
  - type: web
    name: context-graph-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python generate_data.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend - React Static Site
  - type: web
    name: context-graph-ui
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /api/*
        destination: https://dodgeai-yh1n.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
